events {}

http {
    # 許可するOriginを動的に判定
    map $http_origin $allow_origin {
        default                      "";
        "https://k5-dom.github.io"   $http_origin;
        "http://localhost:5173"      $http_origin;
        "http://127.0.0.1:5173"      $http_origin;
        "http://localhost:4173"      $http_origin;
        "http://localhost:3000"      $http_origin;
    }

    server {
        listen 80;

        location / {
            # OPTIONSプリフライトリクエストをnginxで処理
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  $allow_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Content-Type';
                add_header 'Access-Control-Max-Age'       86400;
                return 204;
            }

            proxy_pass http://backend:3001;
            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            # バックエンドのCORSヘッダーを除去してnginxで一元管理
            # (重複ヘッダーはブラウザにブロックされるため)
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            # バックエンドがエラー(502等)の場合もCORSヘッダーを付与
            add_header 'Access-Control-Allow-Origin'  $allow_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type' always;
        }
    }
}
